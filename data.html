<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WB - Data Result</title>
<style>
:root{--bg:#070b14;--card:#11172a;--card2:#161d35;--cyan:#22e8ff;--yellow:#fbbf24;--green:#1fe39a;--red:#ff5d6c;--muted:#5b6b8c;--text:#eaf1ff;--border:#243154;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
.hdr{background:linear-gradient(135deg,#0d1b2a,#1a2f4a);padding:14px;border-bottom:1px solid var(--border);position:sticky;top:0;display:flex;justify-content:space-between;align-items:center}
.hdr b{color:var(--yellow)}
a.back{color:var(--cyan);text-decoration:none;font-size:13px}
.wrap{max-width:1000px;margin:0 auto;padding:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
input,select{width:100%;padding:9px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--text);margin-bottom:8px;font-size:13px}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:6px;border-bottom:1px solid var(--border);text-align:left}
th{color:var(--yellow)}
.tag{padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700}
.tag.ok{background:rgba(31,227,154,.15);color:var(--green)}
.tag.no{background:rgba(255,93,108,.15);color:var(--red)}
.muted{color:var(--muted);font-size:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.mcard{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px;cursor:pointer}
.mcard b{color:var(--cyan)}
</style>
</head>
<body>
<script>
(function(){
  const FEATURE_KEY = "data";
  const m = JSON.parse(localStorage.getItem("wb_logged_member")||"null");
  if(!m){
    document.write("<div style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;background:#070b14;color:#eaf1ff;font-family:sans-serif;text-align:center;padding:20px\"><div><h2 style=\"color:#fbbf24\">🔒 Silakan login dulu</h2><p style=\"color:#5b6b8c;margin:10px 0\">Halaman ini hanya untuk member yang sudah login.</p><a href=\"https://kpps33040420090144-creator.github.io/WB-PREDICTION-/index.html\" style=\"background:#22e8ff;color:#031018;padding:10px 20px;border-radius:8px;text-decoration:none;font-weight:800\">⬅ Ke Halaman Login</a></div></div>");
    document.close();
    throw new Error("not logged in");
  }
  const globalLocked = new Set(JSON.parse(localStorage.getItem("wb_global_lock")||"[]"));
  const memberLocked = new Set(m.locked||[]);
  if(!m.isAdmin && (globalLocked.has(FEATURE_KEY) || memberLocked.has(FEATURE_KEY))){
    document.write("<div style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;background:#070b14;color:#eaf1ff;font-family:sans-serif;text-align:center;padding:20px\"><div><h2 style=\"color:#ff5d6c\">🔒 Fitur Dikunci</h2><p style=\"color:#5b6b8c;margin:10px 0\">Fitur ini dikunci oleh Admin untuk akunmu.</p><a href=\"https://kpps33040420090144-creator.github.io/WB-PREDICTION-/index.html\" style=\"background:#22e8ff;color:#031018;padding:10px 20px;border-radius:8px;text-decoration:none;font-weight:800\">⬅ Kembali</a></div></div>");
    document.close();
    throw new Error("feature locked");
  }
})();
</script>

<div class="hdr"><b>📊 Data Result</b><a class="back" href="https://kpps33040420090144-creator.github.io/WB-PREDICTION-/index.html">⬅ Menu</a></div>
<div class="wrap">
  <div class="card">
    <input id="searchBox" placeholder="Cari pasaran...">
    <p class="muted" id="updInfo">Memuat data...</p>
    <div class="grid" id="marketGrid"></div>
  </div>
  <div class="card hidden" id="detailCard" style="display:none">
    <h3 id="detailTitle" style="color:var(--yellow);margin-bottom:8px"></h3>
    <table><thead><tr><th>Tanggal</th><th>Result</th></tr></thead><tbody id="detailBody"></tbody></table>
  </div>
</div>
<script>
const RESULT_URL = "https://kpps33040420090144-creator.github.io/WB-PREDICTION-/result.json";
let DATA = {};
async function load(){
  try{
    const r = await fetch(RESULT_URL, {cache:"no-store"});
    DATA = await r.json();
    document.getElementById('updInfo').textContent = "Total pasaran: " + Object.keys(DATA).length + " | Auto-update tiap 1 jam";
    renderGrid(Object.keys(DATA));
  }catch(e){
    document.getElementById('updInfo').textContent = "Gagal memuat result.json";
  }
}
function renderGrid(keys){
  const g = document.getElementById('marketGrid');
  g.innerHTML = "";
  keys.forEach(k=>{
    const m = DATA[k];
    const div = document.createElement('div');
    div.className = "mcard";
    div.onclick = ()=>showDetail(k);
    div.innerHTML = `<b>${m.name||k.toUpperCase()}</b><div>Result: ${m.result||'-'}</div><div class="muted">${m.tgl||''} • <span class="tag ${m.status==='sudah'?'ok':'no'}">${m.status||'-'}</span></div>`;
    g.appendChild(div);
  });
}
function showDetail(k){
  const m = DATA[k];
  document.getElementById('detailCard').style.display = "block";
  document.getElementById('detailTitle').textContent = (m.name||k) + " - Riwayat";
  const body = document.getElementById('detailBody');
  body.innerHTML = "";
  (m.history||[]).forEach(h=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${h.date}</td><td>${h.result}</td>`;
    body.appendChild(tr);
  });
  document.getElementById('detailCard').scrollIntoView({behavior:"smooth"});
}
document.getElementById('searchBox').addEventListener('input', e=>{
  const q = e.target.value.toLowerCase();
  const keys = Object.keys(DATA).filter(k => k.toLowerCase().includes(q) || (DATA[k].name||"").toLowerCase().includes(q));
  renderGrid(keys);
});
load();
</script>
</body>
</html>
