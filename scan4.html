<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Scan 4 - Kepala Ekor</title>
<style>
:root{--bg:#070b14;--card:#11172a;--card2:#161d35;--cyan:#22e8ff;--yellow:#fbbf24;--green:#1fe39a;--red:#ff5d6c;--muted:#5b6b8c;--text:#eaf1ff;--border:#243154;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
.hdr{background:linear-gradient(135deg,#0d1b2a,#1a2f4a);padding:14px;border-bottom:1px solid var(--border);position:sticky;top:0;display:flex;justify-content:space-between;align-items:center}
.hdr b{color:var(--yellow)}
a.back{color:var(--cyan);text-decoration:none;font-size:13px}
.wrap{max-width:1000px;margin:0 auto;padding:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
select,input{width:100%;padding:9px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--text);margin-bottom:8px;font-size:13px}
.btn{background:var(--cyan);color:#031018;border:none;border-radius:8px;padding:9px 14px;font-weight:700;cursor:pointer;font-size:13px}
.result{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;margin-top:10px}
.result .big{font-size:28px;color:var(--yellow);font-weight:800;letter-spacing:4px}
.muted{color:var(--muted);font-size:12px}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
th,td{padding:6px;border-bottom:1px solid var(--border);text-align:left}
th{color:var(--cyan)}
</style>
</head>
<body>
<script>
(function(){
  const FEATURE_KEY = "scan4";
  const m = JSON.parse(localStorage.getItem("wb_logged_member")||"null");
  if(!m){
    document.write("<div style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;background:#070b14;color:#eaf1ff;font-family:sans-serif;text-align:center;padding:20px\"><div><h2 style=\"color:#fbbf24\">🔒 Silakan login dulu</h2><p style=\"color:#5b6b8c;margin:10px 0\">Halaman ini hanya untuk member yang sudah login.</p><a href=\"https://kpps33040420090144-creator.github.io/WB-PREDICTION-/index.html\" style=\"background:#22e8ff;color:#031018;padding:10px 20px;border-radius:8px;text-decoration:none;font-weight:800\">⬅ Ke Halaman Login</a></div></div>");
    document.close();
    throw new Error("not logged in");
  }
  const globalLocked = new Set(JSON.parse(localStorage.getItem("wb_global_lock")||"[]"));
  const memberLocked = new Set(m.locked||[]);
  if(!m.isAdmin && (globalLocked.has(FEATURE_KEY) || memberLocked.has(FEATURE_KEY))){
    document.write("<div style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;background:#070b14;color:#eaf1ff;font-family:sans-serif;text-align:center;padding:20px\"><div><h2 style=\"color:#ff5d6c\">🔒 Fitur Dikunci</h2><p style=\"color:#5b6b8c;margin:10px 0\">Fitur ini dikunci oleh Admin untuk akunmu.</p><a href=\"https://kpps33040420090144-creator.github.io/WB-PREDICTION-/index.html\" style=\"background:#22e8ff;color:#031018;padding:10px 20px;border-radius:8px;text-decoration:none;font-weight:800\">⬅ Kembali</a></div></div>");
    document.close();
    throw new Error("feature locked");
  }
})();
</script>

<div class="hdr"><b>🔍 Scan 4 - Kepala Ekor</b><a class="back" href="https://kpps33040420090144-creator.github.io/WB-PREDICTION-/index.html">⬅ Menu</a></div>
<div class="wrap">
  <div class="card">
    <p class="muted" style="margin-bottom:8px">Kombinasi kepala (ribuan) + ekor (satuan) berdasarkan pola riwayat.</p>
    <select id="marketSel"><option>Memuat pasaran...</option></select>
    <button class="btn" style="width:100%" onclick="runScan()">Jalankan Scan</button>
    <div class="result" id="resBox" style="display:none">
      <div class="muted" id="resLabel"></div>
      <div class="big" id="resBig">-</div>
      <div class="muted" id="resSub"></div>
    </div>
  </div>
  <div class="card" id="histCard" style="display:none">
    <h3 style="color:var(--yellow);margin-bottom:6px">Riwayat Terakhir</h3>
    <table><thead><tr><th>Tanggal</th><th>Result</th></tr></thead><tbody id="histBody"></tbody></table>
  </div>
</div>
<script>
const RESULT_URL = "https://kpps33040420090144-creator.github.io/WB-PREDICTION-/result.json";
let DATA = {};
async function load(){
  try{
    const r = await fetch(RESULT_URL, {cache:"no-store"});
    DATA = await r.json();
    const sel = document.getElementById('marketSel');
    sel.innerHTML = "";
    Object.keys(DATA).forEach(k=>{
      const o = document.createElement('option');
      o.value = k; o.textContent = DATA[k].name || k.toUpperCase();
      sel.appendChild(o);
    });
  }catch(e){
    document.getElementById('marketSel').innerHTML = "<option>Gagal memuat data</option>";
  }
}
function digitFreq(history, posFn){
  const freq = Array(10).fill(0);
  history.forEach(h=>{
    const d = posFn(h.result);
    if(d!==null && d!==undefined) freq[+d]++;
  });
  return freq;
}
function topDigits(freq, n){
  return freq.map((v,i)=>[i,v]).sort((a,b)=>b[1]-a[1]).slice(0,n).map(x=>x[0]);
}
function runScan(){
  const k = document.getElementById('marketSel').value;
  const m = DATA[k];
  if(!m || !m.history || !m.history.length){ alert("Data riwayat tidak tersedia"); return; }
  const hist = m.history.slice(0, 30);
  const out = scanLogic4(hist);
  document.getElementById('resBox').style.display = "block";
  document.getElementById('resLabel').textContent = (m.name||k) + " — Kepala-Ekor";
  document.getElementById('resBig').textContent = out.main;
  document.getElementById('resSub').textContent = out.sub;
  document.getElementById('histCard').style.display = "block";
  const body = document.getElementById('histBody');
  body.innerHTML = "";
  hist.slice(0,10).forEach(h=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${h.date}</td><td>${h.result}</td>`;
    body.appendChild(tr);
  });
}
function scanLogic4(hist){
  const kep = digitFreq(hist, r => r.slice(0,1));
  const ekr = digitFreq(hist, r => r.slice(3,4));
  const tk = topDigits(kep,2), te = topDigits(ekr,2);
  return { main: String(tk[0])+String(te[0]), sub: "Kepala: " + tk.join(",") + " | Ekor: " + te.join(",") };
}
load();
</script>
</body>
</html>
